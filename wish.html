<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Teju!</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Segoe UI', sans-serif;
            color: #444;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 500px;
        }
        #slideshow {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 20px;
            margin-top: 20px;
            transition: opacity 1s ease-in-out;
        }
        h1 { color: #5a4a8c; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Happy Birthday, Teju!</h1>
    <p>Cherishing our memories from Instagram DMs...</p>
    <img id="slideshow" src="teju1.png" alt="Memory">
    <p style="margin-top: 20px;"><i>From your brother, Aarav</i></p>
</div>

<script>
    // Make sure these match your filenames exactly!
    const images = ["teju1.png", "teju2.png", "teju3.png", "teju4.png"];
    let i = 0;
    const imgEl = document.getElementById('slideshow');

    function changeImage() {
        imgEl.style.opacity = 0; // Fade out
        setTimeout(() => {
            i = (i + 1) % images.length;
            imgEl.src = images[i];
            imgEl.style.opacity = 1; // Fade in
        }, 1000);
    }
    
    setInterval(changeImage, 4000); // Changes every 4 seconds
</script>

</body>
</html>
